<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Vault door background -->
  <circle cx="50" cy="50" r="45" fill="#1a1a2e" stroke="#0f3460" stroke-width="2"/>
  
  <!-- Vault door outer ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#16213e" stroke-width="1" opacity="0.5"/>
  
  <!-- Vault lock mechanism -->
  <circle cx="50" cy="50" r="28" fill="#0f3460" stroke="#16213e" stroke-width="2"/>
  
  <!-- Lock dial rings -->
  <circle cx="50" cy="50" r="24" fill="none" stroke="#16213e" stroke-width="1"/>
  <circle cx="50" cy="50" r="18" fill="none" stroke="#16213e" stroke-width="1"/>
  
  <!-- Dial numbers/ticks -->
  <g stroke="#16213e" stroke-width="1" opacity="0.7">
    <line x1="50" y1="28" x2="50" y2="32"/>
    <line x1="65" y1="35" x2="62" y2="38"/>
    <line x1="72" y1="50" x2="68" y2="50"/>
    <line x1="65" y1="65" x2="62" y2="62"/>
    <line x1="50" y1="72" x2="50" y2="68"/>
    <line x1="35" y1="65" x2="38" y2="62"/>
    <line x1="28" y1="50" x2="32" y2="50"/>
    <line x1="35" y1="35" x2="38" y2="38"/>
  </g>
  
  <!-- Center lock pin -->
  <circle cx="50" cy="50" r="6" fill="#e94560" stroke="#c1003d" stroke-width="1"/>
  
  <!-- Shine effect -->
  <ellipse cx="42" cy="42" rx="8" ry="10" fill="white" opacity="0.2"/>
</svg>